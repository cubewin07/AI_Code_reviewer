spring:
  datasource:
    url: jdbc:sqlite:data/reviewer-test.db

management:
  defaults:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

app:
  github:
    app-id: 123456
    private-key-path: mock-key.pem
    webhook-secret: test-webhook-secret
    api-url: http://localhost:8089
  nine-router:
    base-url: https://api.9router.com
    api-key: mock-api-key
    model: meta-llama/llama-3-70b-instruct
    fallback-model: meta-llama/llama-3-8b-instruct
    max-tokens: 4096
    timeout-seconds: 60
  worker:
    concurrency: 2
    max-attempts: 3
